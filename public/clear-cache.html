<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Cache - Gadget World</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #333;
      margin-bottom: 1rem;
    }
    .status {
      font-size: 1.2rem;
      color: #666;
      margin: 2rem 0;
    }
    .success {
      color: #10b981;
      font-weight: bold;
    }
    .button {
      background: #ea580c;
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1rem;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background: #c2410c;
    }
    .list {
      text-align: left;
      margin: 1.5rem 0;
    }
    .list li {
      margin: 0.5rem 0;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Cache Cleared!</h1>
    <div class="status">
      <p class="success">✅ All caches have been cleared</p>
    </div>
    
    <div class="list">
      <p><strong>What was cleared:</strong></p>
      <ul>
        <li>Browser cache</li>
        <li>Local storage</li>
        <li>Session storage</li>
        <li>Service workers</li>
      </ul>
    </div>

    <p style="color: #666; margin-top: 2rem;">
      All product data will now be fetched fresh from MongoDB on every request.
    </p>

    <a href="/" class="button">Go to Homepage</a>
    <br>
    <a href="/products" class="button" style="background: #6366f1; margin-top: 0.5rem;">Browse Products</a>
  </div>

  <script>
    // Clear all caches
    (async function clearAllCaches() {
      // Clear localStorage
      localStorage.clear();
      
      // Clear sessionStorage
      sessionStorage.clear();
      
      // Unregister service workers
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (let registration of registrations) {
          await registration.unregister();
        }
      }
      
      // Clear cache storage
      if ('caches' in window) {
        const cacheNames = await caches.keys();
        await Promise.all(
          cacheNames.map(cacheName => caches.delete(cacheName))
        );
      }
      
      console.log('✅ All caches cleared successfully!');
    })();
  </script>
</body>
</html>
